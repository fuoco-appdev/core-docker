# Deploys Kubernetes manifests via docker/kubectl_apply.sh to DigitalOcean Kubernetes (DOKS).
#
# Configure the GitHub Environment "production" (or repo-level secrets/variables):
#   Secrets:
#     DIGITALOCEAN_ACCESS_TOKEN — Personal access token with Kubernetes read/write (and any scopes doctl needs).
#     PRODUCTION_ENV            — Full contents of the repo-root .env for Helm/envsubst and env-secrets.
#   Variables (recommended; not sensitive):
#     DIGITALOCEAN_KUBERNETES_CLUSTER_NAME — Cluster name as shown in the DO control panel (or use workflow input).
#
# Optional secret when volumes/ssl/root.pass is missing (kubectl_apply.sh sources setup_ssl.sh):
#   PRODUCTION_SSL_ROOT_KEY_PASS — sets SSL_ROOT_KEY_PASS for non-interactive setup_ssl.sh in CI.
#
# The apply scripts also expect nginx basic auth under docker/volumes/nginx/ (see docker/.gitignore).
name: Production

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'DigitalOcean Kubernetes cluster name (leave empty to use DIGITALOCEAN_KUBERNETES_CLUSTER_NAME variable)'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production-kubernetes
  cancel-in-progress: false

jobs:
  deploy-kubernetes:
    name: Deploy Kubernetes cluster (DigitalOcean)
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base openssl apache2-utils dos2unix util-linux

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Save DigitalOcean kubeconfig
        env:
          CLUSTER_INPUT: ${{ inputs.cluster_name }}
          CLUSTER_VAR: ${{ vars.DIGITALOCEAN_KUBERNETES_CLUSTER_NAME }}
        run: |
          CLUSTER_NAME="${CLUSTER_INPUT}"
          if [[ -z "${CLUSTER_NAME}" ]]; then
            CLUSTER_NAME="${CLUSTER_VAR}"
          fi
          if [[ -z "${CLUSTER_NAME}" ]]; then
            echo "Set DIGITALOCEAN_KUBERNETES_CLUSTER_NAME on the production environment (or repo variable), or pass cluster_name when running the workflow."
            exit 1
          fi
          mkdir -p "${HOME}/.kube"
          # Short-lived credentials; duration must cover the job (timeout 120m).
          doctl kubernetes cluster kubeconfig save "${CLUSTER_NAME}" --expiry-seconds 7200
          echo "KUBECONFIG_FILE=${HOME}/.kube/config" >> "${GITHUB_ENV}"

      - name: Write production .env
        env:
          ENV_BODY: ${{ secrets.PRODUCTION_ENV }}
        run: |
          if [[ -z "${ENV_BODY}" ]]; then
            echo "PRODUCTION_ENV secret is not set."
            exit 1
          fi
          printf '%s\n' "$ENV_BODY" > "${GITHUB_WORKSPACE}/.env"

      - name: Apply Kubernetes stack
        working-directory: docker
        env:
          KUBECONFIG_FILE: ${{ env.KUBECONFIG_FILE }}
          SSL_ROOT_KEY_PASS: ${{ secrets.PRODUCTION_SSL_ROOT_KEY_PASS }}
        run: |
          if [[ ! -f ./volumes/ssl/root.pass && -z "${SSL_ROOT_KEY_PASS:-}" ]]; then
            echo "Missing docker/volumes/ssl/root.pass. Add it to the repo or set PRODUCTION_SSL_ROOT_KEY_PASS (kubectl_apply.sh runs setup_ssl.sh)."
            exit 1
          fi
          set -a
          source "${GITHUB_WORKSPACE}/.env"
          set +a
          # Pseudo-TTY so kubectl exec -it in kubectl_setup_core.sh works non-interactively.
          script -q -e -c "bash kubectl_apply.sh -c \"${KUBECONFIG_FILE}\""
